<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- Favicon y PWA -->
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico.png" />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <meta name="theme-color" content="#2563EB" />

    <!-- SEO Base -->
    <title>Publientis | Vinculación Profesional Universitaria</title>
    <meta name="author" content="Publientis" />

    <!--
      Meta tags provisionales enfocados en Facultad de Educación UdeA.
      TODO: Estos valores se dinamizarán por cada universidad registrada
      mediante react-helmet-async en el componente SEO.js.
    -->
    <meta
      name="description"
      content="Publientis: plataforma de vinculación profesional que conecta practicantes y egresados de la Facultad de Educación de la Universidad de Antioquia con el sector educativo y empresarial."
    />
    <meta
      name="keywords"
      content="prácticas pedagógicas UdeA, vinculación laboral egresados educación, bolsa de empleo docentes Antioquia, red social académica, portafolio profesional universitario, practicantes Facultad de Educación, Universidad de Antioquia"
    />

    <!-- Open Graph (WhatsApp, Facebook, LinkedIn) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Publientis" />
    <meta property="og:title" content="Publientis | Vinculación Profesional Universitaria" />
    <meta property="og:description" content="Conectamos estudiantes, egresados y empresas del sector educativo. Publica tu perfil académico, encuentra prácticas y oportunidades laborales." />
    <meta property="og:image" content="https://publientis.online/logo512.png" />
    <meta property="og:url" content="https://publientis.online" />
    <meta property="og:locale" content="es_CO" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Publientis | Vinculación Profesional Universitaria" />
    <meta name="twitter:description" content="Conectamos estudiantes, egresados y empresas del sector educativo. Publica tu perfil académico y encuentra oportunidades." />
    <meta name="twitter:image" content="https://publientis.online/logo512.png" />

    <!-- Canonical -->
    <link rel="canonical" href="https://publientis.online" />

    <!-- ePayco Checkout Script para PSE -->
    <script src="https://checkout.epayco.co/checkout.js" defer></script>
  </head>
  <body>
    <noscript>Necesitas habilitar JavaScript para ejecutar esta aplicación.</noscript>
    <div id="root"></div>
  </body>
</html>
